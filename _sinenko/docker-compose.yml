services:
    php:
        build:
            context: ../
            dockerfile: _sinenko/docker/php/Dockerfile
        volumes:
            - storage_data:/var/www/html/storage/app/public
        # TODO: решить что делать с этим что бы не перебилдживало зависимости.
        #     - /var/www/html/vendor
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=${DB_DATABASE:?DB_DATABASE is required}
            - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
            - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
        networks:
            - laravel
        depends_on:
            - postgres
        ports:
            - "${APP_PORT:-80}:80"
    postgres:
        image: postgres:16
        environment:
            - POSTGRES_DB=${DB_DATABASE:?DB_DATABASE is required}
            - POSTGRES_USER=${DB_USERNAME:?DB_USERNAME is required}
            - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
        volumes:
            - pg_data:/var/lib/postgresql/data
        networks:
            - laravel

volumes:
    pg_data:
        name: ${VOLUME_PREFIX:-${COMPOSE_PROJECT_NAME}_pg_data}
    storage_data:
        name: ${VOLUME_PREFIX:-${COMPOSE_PROJECT_NAME}_storage}

networks:
    laravel:
